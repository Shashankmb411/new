<!DOCTYPE html>
<html>
<head>
<title>My AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#202123;
padding:15px;
}

.sidebar h2{
font-size:18px;
}

/* MAIN CHAT */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT AREA */
.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
}

/* MESSAGE */
.message{
margin:10px 0;
line-height:1.6;
}

.user{
text-align:right;
color:#4fc3f7;
}

.bot{
text-align:left;
color:#e0e0e0;
}

/* INPUT AREA */
.input-area{
display:flex;
padding:15px;
background:#40414f;
}

textarea{
flex:1;
resize:none;
border:none;
outline:none;
padding:10px;
border-radius:5px;
font-size:15px;
background:#343541;
color:white;
height:40px;
}

/* BUTTONS */
button{
margin-left:10px;
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:5px;
}

.send-btn{ background:#19c37d; }
.img-btn{ background:#9333ea; }
.pdf-btn{ background:#f59e0b; }

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🤖 My AI</h2>
<p>ChatGPT Style Bot</p>

<button class="img-btn" onclick="generateImage()">🎨 Image</button><br><br>
<button class="pdf-btn" onclick="uploadPDF()">📄 PDF</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="chat-box" id="chatBox">
<div class="message bot">Hello! I am your AI 🚀</div>
</div>

<div class="input-area">
<textarea id="input" placeholder="Message AI..."></textarea>
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const input = document.getElementById("input");

/* ENTER TO SEND */
input.addEventListener("keydown", function(e){
if(e.key === "Enter" && !e.shiftKey){
e.preventDefault();
sendMessage();
}
});

/* AUTO HEIGHT */
input.addEventListener("input", ()=>{
input.style.height = "auto";
input.style.height = input.scrollHeight + "px";
});

/* SEND MESSAGE */
async function sendMessage(){

let msg = input.value.trim();
let chat = document.getElementById("chatBox");

if(msg==="") return;

/* USER */
chat.innerHTML += `<div class="message user">${msg}</div>`;
input.value="";
input.style.height="40px";
chat.scrollTop = chat.scrollHeight;

/* BOT PLACEHOLDER */
let botDiv = document.createElement("div");
botDiv.className = "message bot";
chat.appendChild(botDiv);

/* FETCH AI */
try{

const response = await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

const data = await response.json();

/* TYPE EFFECT */
typeEffect(botDiv, data.reply);

}catch{
botDiv.innerText = "Error connecting AI";
}

chat.scrollTop = chat.scrollHeight;

}

/* TYPING ANIMATION */
function typeEffect(element, text){

let i = 0;

function typing(){
if(i < text.length){
element.innerHTML += text.charAt(i);
i++;
setTimeout(typing, 20);
}
}

typing();

}

/* IMAGE BUTTON */
function generateImage(){
alert("Image generation feature coming soon 🚀");
}

/* PDF BUTTON */
function uploadPDF(){
alert("PDF analysis feature coming soon 🚀");
}

</script>

</body>
</html>
